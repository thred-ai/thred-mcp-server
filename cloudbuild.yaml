steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/thred-mcp:${_IMAGE_TAG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/thred-mcp:latest'
      - '.'
  
  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/thred-mcp:${_IMAGE_TAG}']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/thred-mcp:latest']
  
  # Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'thred-mcp'
      - '--image'
      - 'gcr.io/$PROJECT_ID/thred-mcp:${_IMAGE_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--set-env-vars'
      - 'NODE_ENV=production,TRANSPORT=http'
      - '--set-secrets'
      - 'THRED_BASE_URL=thred-mcp-base-url:latest'

images:
  - 'gcr.io/$PROJECT_ID/thred-mcp:${_IMAGE_TAG}'
  - 'gcr.io/$PROJECT_ID/thred-mcp:latest'

timeout: 1200s

substitutions:
  _IMAGE_TAG: 'latest'
